<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://img.icons8.com/ios/100/like--v1.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
  <title>Foda (eu e você)</title>
</head>

<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand">Literally Us (Forever)</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">History</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="fotos.html">Photos</a>
            </li>
          </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="container d-flex justify-content-center align-items-center">
      <div class="text-center">
        <h1 class="display-1">Nossa História <i class="bi bi-arrow-through-heart"></i></h1>
        <figcaption class="blockquote-footer">mwahmwahmwah</figcaption>
      </div>
    </div>

    <div class="container d-flex justify-content-center align-items-center mt-3">
      <h1 class="text-center mb-2">Listinhas <i class="bi bi-clipboard-heart"></i></h1>
    </div>

    <div class="container d-flex justify-content-center align-items-center mt-5">
      <div id="listas" class="row">
        <!-- Listas carregadas dinamicamente do Gist -->
        <div class="col-12 text-center text-muted py-4">
          <div class="spinner-border spinner-border-sm me-2" role="status"></div>
          Carregando listinhas...
        </div>

        <!-- Contador de Tempo Juntos (sempre fixo) -->
        <div class="col-md-3 mb-4" id="contador-card">
          <div class="card text-center">
            <div class="card-header text-white bg-danger">
              <h5 class="mb-0">⏳ Estamos juntos há...</h5>
            </div>
            <div class="card-body">
              <p id="contador">Calculando...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center">
    <section class="spotify">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4ux73U74tcd1AXVKlWhWXy?utm_source=generator&theme=0" 
      width="25%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy"></iframe>
    </section>
    <section class="container mb-2">
      <div class="pb-3 d-flex flex-column justify-content-center">
        <div class="mt-3">
          <i class="bi bi-heart"></i> Você é o amô da minha vida <i class="bi bi-heart"></i>
        </div>
        <div>
          <button id="startButton" type="button" class="btn btn-outline-dark mt-4 mb-2">pspsps</button>
        </div>
      </div>
    </section>
    <section>
      
      <div id="gameContainer" style="display: none;">
        <h2>Fuja da Powder!!!</h2>
        <p>Use as setas ⬅️➡️ para se mover</p>
        <canvas id="gameCanvas"></canvas>
      </div>
    </section>
  </footer>

  <script>
    const GIST_ID = "c865bb6ec60a9c2e303f671fff3cb003";
    const CACHE_BUST = new Date().getTime(); // Timestamp único, sempre maior do que o anterior, para garantir que o navegador busque a versão mais recente do Gist
    const GIST_URL = `https://gist.githubusercontent.com/FelipeGardenghiDev/${GIST_ID}/raw/data.json?v=${CACHE_BUST}`;

    function calcularTempoJuntos() {
      const dataInicio = new Date("2024-10-20");
      const hoje = new Date();
      const dias = Math.floor((hoje - dataInicio) / (1000 * 60 * 60 * 24));
      document.getElementById("contador").innerText = `💖💖 ${dias} dias! 💖💖 (desde 20/10/2024)`;
    }

    function renderizarListas(listas) {
      const container = document.getElementById("listas");
      const contadorCard = document.getElementById("contador-card");

      // Remove o loading
      container.querySelectorAll(".col-12.text-muted").forEach(el => el.remove());

      listas.forEach(lista => {
        const col = document.createElement("div");
        col.className = "col-md-3 mb-4";
        col.innerHTML = `
          <div class="card">
            <div class="card-header text-white" style="background-color: ${lista.cor};">
              <h5 class="mb-0">${lista.titulo}</h5>
            </div>
            <ul class="list-group list-group-flush">
              ${lista.itens.map(item => `<li class="list-group-item">${item}</li>`).join("")}
            </ul>
          </div>`;

        // Insere antes do card do contador
        container.insertBefore(col, contadorCard);
      });
    }

    async function carregarListas() {
      try {
        const res = await fetch(GIST_URL);
        if (!res.ok) throw new Error("Falha ao carregar o Gist");
        const data = await res.json();
        renderizarListas(data.listas);
      } catch (err) {
        const container = document.getElementById("listas");
        container.querySelectorAll(".col-12.text-muted").forEach(el => {
          el.innerHTML = "⚠️ Não foi possível carregar as listinhas. Verifique a URL do Gist.";
        });
        console.error(err);
      }
    }

    calcularTempoJuntos();
    setInterval(calcularTempoJuntos, 1000 * 60 * 60 * 24);
    carregarListas();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>

</html>
